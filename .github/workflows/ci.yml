# CI mirrors the local forge gate (and the prek pre-commit hooks): ruff, mypy,
# pytest. A green run means the same thing /forge:check does locally. The matrix
# spans the versions pyproject supports (requires-python >=3.10).
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    # uv reads this to select (and auto-download) the interpreter for the venv,
    # so we don't need a separate setup-python step.
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v5

      # Install uv via its standalone shell installer rather than a Node-based
      # action, so CI stays off the deprecated Node 20 action runtime entirely.
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Sync dev dependencies
        run: uv sync --group dev

      - name: Lint & format check
        run: |
          uv run --group dev ruff check .
          uv run --group dev ruff format --check .

      - name: Type check
        run: uv run --group dev mypy lib tests

      - name: Tests + coverage
        run: uv run --group dev pytest --cov
